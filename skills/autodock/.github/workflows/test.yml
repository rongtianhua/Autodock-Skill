name: CI / 持续集成

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  # ── Job 1: Python lint + unit tests (lightweight) ─────────────────────────
  test-core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies / 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8 pydantic pyyaml requests numpy pandas
          # Light-deps only; heavy stack (RDKit, Vina, PyMOL, PLIP) tested locally

      - name: Lint with flake8 / 代码风格检查
        run: |
          flake8 autodock/ schemas/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 autodock/ schemas/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Validate schemas / 校验配置 Schema
        run: |
          python -c "from schemas.docking_config import DockingConfig, validate_config; print('Schema OK')"

      - name: Run lightweight tests / 运行轻量测试
        run: |
          pytest tests/test_input_validation.py tests/test_cli.py -v --tb=short
        continue-on-error: true

  # ── Job 2: SnakeMake dry-run / SnakeMake  dry-run 测试 ──────────────────────
  test-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install SnakeMake + pydantic / 安装 SnakeMake
        run: |
          pip install snakemake pydantic pyyaml pandas

      - name: Create dummy config / 创建测试配置
        run: |
          cat > docking_config.yml << 'EOF'
          receptor:
            id: "6LU7"
          ligand_library:
            path: "tests/data/dummy_ligands.csv"
            name_column: "compound"
            max_count: 5
          docking:
            center: [10.0, 20.0, 30.0]
            box_size: [20, 20, 20]
            exhaustiveness: 8
            n_poses: 3
          post_dock:
            mmpbsa: false
            render_2d: false
            top_n: 5
          EOF
          mkdir -p tests/data
          echo "compound,smiles" > tests/data/dummy_ligands.csv
          echo "aspirin,CC(=O)Oc1ccccc1C(=O)O" >> tests/data/dummy_ligands.csv
          echo "caffeine,CN1C=NC2=C1C(=O)N(C(=O)N2C)C" >> tests/data/dummy_ligands.csv

      - name: Validate config schema / 校验配置
        run: |
          python -c "
          import yaml
          from schemas.docking_config import validate_config
          with open('docking_config.yml') as f:
              cfg = yaml.safe_load(f)
          validate_config(cfg)
          print('Config validation passed')
          "

      - name: SnakeMake dry-run / SnakeMake 干运行
        run: |
          snakemake --cores 1 --dry-run || echo "Dry-run requires full env; schema validation is the key test"
        continue-on-error: true

  # ── Job 3: README + docs check / 文档完整性检查 ─────────────────────────────
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code / 检出代码
        uses: actions/checkout@v4

      - name: Check file existence / 检查文件完整性
        run: |
          test -f README.md || (echo "README.md missing" && exit 1)
          test -f SKILL.md || (echo "SKILL.md missing" && exit 1)
          test -f environment.yml || (echo "environment.yml missing" && exit 1)
          test -f Snakefile || (echo "Snakefile missing" && exit 1)
          test -d schemas/ || (echo "schemas/ missing" && exit 1)
          echo "All required files present ✓"

      - name: Check README sections / 检查 README 章节
        run: |
          grep -q "## 中文介绍" README.md || (echo "README missing Chinese section" && exit 1)
          grep -q "## English Introduction" README.md || (echo "README missing English section" && exit 1)
          echo "Bilingual README OK ✓"
